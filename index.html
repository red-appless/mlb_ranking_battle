<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB順位予想 2026</title>

<style>
:root{
    --mlb-blue:#0a2a66;
    --mlb-red:#d71920;
    --bg:#f3f5f8;
}

body{
    margin:0;
    font-family:"Helvetica Neue",Arial,sans-serif;
    background:var(--bg);
    color:#222;
}

/* ===============================
   HERO
================================ */
.hero{
    position:relative;
    height:320px;
    background:url("https://images.unsplash.com/photo-1508098682722-e99c643e7f8e?auto=format&fit=crop&w=1600&q=80") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#fff;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(10,42,102,0.85));
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:42px;
    margin:0 0 20px 0;
    font-weight:900;
    letter-spacing:1px;
}

.update-btn{
    background:var(--mlb-red);
    border:none;
    padding:12px 28px;
    border-radius:8px;
    font-weight:bold;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.update-btn:hover{
    opacity:0.9;
}

.last-updated{
    margin-top:15px;
    font-size:14px;
    opacity:0.9;
}

/* ===============================
   CONTAINER
================================ */
.container{
    max-width:1200px;
    margin:-60px auto 40px auto;
    padding:0 20px;
}

/* ===============================
   CARD
================================ */
.card{
    background:white;
    border-radius:16px;
    padding:25px;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    border-top:6px solid var(--mlb-blue);
}

.card h2{
    text-align:center;
    color:var(--mlb-blue);
    margin-bottom:20px;
}

.card h3{
    text-align:center;
    color:var(--mlb-blue);
    margin-bottom:15px;
}

/* ===============================
   TABLE
================================ */
table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:var(--mlb-blue);
    color:white;
    padding:10px;
    font-size:14px;
}

td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid #eee;
    font-size:14px;
}

td:first-child{
    font-weight:bold;
}

.team-cell{
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:flex-start;
}

.team-cell img{
    width:24px;
    height:24px;
}

.team-cell span{
    font-size:14px;
}

.score-total{
    font-weight:bold;
    color:var(--mlb-red);
    font-size:18px;
}

.clickable-name{
    cursor:pointer;
    font-weight:bold;
    color:var(--mlb-blue);
}

/* ===============================
   GRID
================================ */
.division-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:25px;
}

@media(min-width:900px){
    .division-grid{
        grid-template-columns:1fr 1fr;
    }
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
    <div class="hero-content">
        <h1>MLB 順位予想 2026</h1>
        <button id="updateButton" class="update-btn">最新データに基づく</button>
        <div class="last-updated">
            最終更新: <span id="lastUpdated">-</span>
        </div>
    </div>
</div>

<div class="container">

    <!-- 総合順位 -->
    <div class="card">
        <h2>🏆 総合順位</h2>
        <table id="scoreTable">
            <thead>
                <tr>
                    <th>位</th>
                    <th>プレイヤー</th>
                    <th>反転数</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- 地区 -->
    <div id="divisionsContainer" class="division-grid"></div>

</div>

<script>
let globalData=null;

const getLogo=(id)=>`https://www.mlbstatic.com/team-logos/${id}.svg`;

async function loadData(){
    const res=await fetch('./data.json?'+Date.now());
    globalData=await res.json();
    render();
}

function render(){
    document.getElementById("lastUpdated").innerText=globalData.last_updated;

    // 総合順位
    const tbody=document.querySelector("#scoreTable tbody");
    tbody.innerHTML=Object.entries(globalData.scores)
        .sort((a,b)=>a[1]-b[1])
        .map(([name,score],i)=>`
            <tr>
                <td>${i+1}</td>
                <td><span class="clickable-name">${name}</span></td>
                <td class="score-total">${score}</td>
            </tr>
        `).join("");

    // 地区
    const container=document.getElementById("divisionsContainer");
    container.innerHTML=globalData.divisions.map(div=>`
        <div class="card">
            <h3>${div.name}</h3>
            <table>
                <thead>
                    <tr>
                        <th>実順位</th>
                        <th>チーム</th>
                        <th>細川</th>
                        <th>井口</th>
                        <th>田中</th>
                    </tr>
                </thead>
                <tbody>
                    ${div.teams.map(t=>`
                        <tr>
                            <td>${t.actual_rank}</td>
                            <td>
                                <div class="team-cell">
                                    <img src="${getLogo(t.id)}">
                                    <span>${t.name}</span>
                                </div>
                            </td>
                            <td>${t.predictions["細川峻平"]}</td>
                            <td>${t.predictions["井口健介"]}</td>
                            <td>${t.predictions["田中雄太郎"]}</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        </div>
    `).join("");
}

loadData();
</script>

</body>
</html>
