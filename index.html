<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB順位予想 2026</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h1, h2, h3 { color: #002D72; text-align: center; }
        .header-box { text-align: center; margin-bottom: 10px; }
        button { background-color: #E31937; color: white; border: none; padding: 14px 28px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #b3142b; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
        th { background-color: #002D72; color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .score-total { font-size: 1.3em; font-weight: bold; color: #E31937; }
        .division-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⚾ MLB 順位予想バトル 2026</h1>
            <div class="header-box">
                <button id="updateButton">最新データに更新</button>
                <p>最終更新: <span id="lastUpdated">取得中...</span></p>
            </div>
        </div>

        <div class="card">
            <h2>🏆 総合ランキング</h2>
            <table id="scoreTable">
                <thead><tr><th>位</th><th>プレイヤー</th><th>合計反転数</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="division-grid" id="divisionsContainer"></div>
    </div>

    <script>
        // ★ここにGoogle Apps Scriptで発行されたURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbyO5_oG_IAp8whEPVHdSLKiP945F-fCb9uPymUo6hm3ZNu93-rqZKpQj-bfv7diGcXZ/exec";

        async function loadData() {
            try {
                const res = await fetch('./data.json?' + Date.now());
                const data = await res.json();
                document.getElementById('lastUpdated').innerText = data.last_updated;

                const scoreBody = document.querySelector('#scoreTable tbody');
                scoreBody.innerHTML = Object.entries(data.scores)
                    .sort((a, b) => a[1] - b[1])
                    .map(([name, score], i) => `<tr><td>${i+1}</td><td style="font-weight:bold">${name}</td><td class="score-total">${score}</td></tr>`).join('');

                const divContainer = document.getElementById('divisionsContainer');
                divContainer.innerHTML = data.divisions.map(div => `
                    <div class="card">
                        <h3>${div.name}</h3>
                        <table>
                            <thead><tr><th>実順位</th><th>チーム</th><th>井口</th><th>細川</th><th>田中</th></tr></thead>
                            <tbody>
                                ${div.teams.map(t => `
                                    <tr>
                                        <td>${t.actual_rank}</td>
                                        <td>${t.name}</td>
                                        <td>${t.predictions["井口健介"]}</td>
                                        <td>${t.predictions["細川峻平"]}</td>
                                        <td>${t.predictions["田中雄太郎"]}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `).join('');
            } catch (e) { document.getElementById('lastUpdated').innerText = "データ未生成"; }
        }

        document.getElementById('updateButton').onclick = async () => {
            if(!confirm("GitHub Actionsを起動しますか？（反映まで約2分）")) return;
            const btn = document.getElementById('updateButton');
            btn.disabled = true; btn.innerText = "GASへリクエスト送信中...";
            
            try {
                // GASへリクエスト（CORS回避のためno-corsモードを使用）
                await fetch(GAS_URL, { method: 'POST', mode: 'no-cors' });
                alert("送信完了！2分ほど待ってから再読み込みしてください。");
                btn.innerText = "更新要求済み";
            } catch (e) {
                alert("エラーが発生しました。");
                btn.disabled = false;
                btn.innerText = "最新データに更新";
            }
        };

        loadData();
    </script>
</body>
</html>
